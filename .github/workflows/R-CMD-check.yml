name: R CMD check

on:
  push:
    branches: [main, master]
    paths:
      - .github/workflows/R-CMD-check.yml
      - .Rbuildignore
      - DESCRIPTION
      - NAMESPACE
      - R/**
      - src/**
      - tests/**
      - vignettes/**
      - man/**
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/R-CMD-check.yml
      - .Rbuildignore
      - DESCRIPTION
      - NAMESPACE
      - R/**
      - src/**
      - tests/**
      - vignettes/**
      - man/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TESTTHAT_CPUS: '2'

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: https://community.r-multiverse.org

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=15.0" >> "$GITHUB_ENV"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-dev

      - name: Install Rust toolchain (Unix)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain (Windows GNU)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable-x86_64-pc-windows-gnu
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust -> target

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck

      - uses: r-lib/actions/check-r-package@v2

      - name: Show check logs on failure
        if: failure()
        shell: pwsh
        run: |
          $logs = @(
            "check/jiebaRS.Rcheck/00install.out",
            "check/jiebaRS.Rcheck/00check.log",
            "check/jiebaRS.Rcheck/tests/testthat.Rout",
            "check/jiebaRS.Rcheck/tests/spelling.Rout"
          )

          foreach ($log in $logs) {
            if (Test-Path $log) {
              Write-Host "::group::$log"
              Get-Content $log -Raw
              Write-Host "::endgroup::"
            } else {
              Write-Host "Missing $log"
            }
          }

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-Rcheck
          path: check/jiebaRS.Rcheck
